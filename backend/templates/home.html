<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koti</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #2c2c2c;
            color: #222;
        }
        .admin-box {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        .stat-card {
            background: #f7fbff;
            border: 1px solid #dce7f4;
            border-radius: 10px;
            padding: 18px;
            text-align: center;
        }
        .stat-card h2 {
            margin: 0;
            font-size: 2.2rem;
            color: #0f5ba1;
        }
        .stat-card p {
            margin: 8px 0 0;
            color: #4a5568;
            font-size: 0.95rem;
        }
        .actions a {
            text-decoration: none;
            background: #007bff;
            color: white;
            padding: 10px 14px;
            border-radius: 4px;
        }
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    {% extends 'navbar.html' %}
    {% block body %}
    <div class="admin-box">
        <h1>Admin</h1>
        <div class="stats-grid">
            <div class="stat-card">
                <h2>{{ users_count }}</h2>
                <p>Käyttäjiä</p>
            </div>
            <div class="stat-card">
                <h2>{{ species_count }}</h2>
                <p>Lajia</p>
            </div>
            <div class="stat-card">
                <h2>{{ rods_count }}</h2>
                <p>Vapaa</p>
            </div>
            <div class="stat-card">
                <h2>{{ lures_count }}</h2>
                <p>viehettä</p>
            </div>
        </div>
    </div>
    {% endblock %}
</body>
</html>
