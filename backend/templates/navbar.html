<!DOCTYPE html>
<html>
<body>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #333333;
        }

        ul li {
            float: left;
            margin-left: 10px;
        }

        ul li a {
            display: block;
            color: white;
            padding: 14px 16px;
            text-decoration: none;
            margin: 5px;
        }

        ul li p {
            display: block;
            color: white;
            padding: 14px 16px;
            text-decoration: none;
            margin: 5px;
        }

        ul li a:hover {
            background-color: #454545;
            border-radius: 6px;
        }

    </style>
    <ul>
        <li><a href="{{ url_for('home') }}">Koti</a></li>
        <li><a href="{{ url_for('poista') }}">Poista</a></li>
        <li style="float:right; color: white; margin-right: 40px;"><p>Terve, {{ session.get('username' )}}</p></li>
    </ul>
    {% block body %}
    {% endblock %}
</body>
</html>
